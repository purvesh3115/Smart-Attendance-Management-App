name: smart_attendance
description: Smart Attendance Management App with QR codes and GPS validation.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # QR Code generation & scanning
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.6
  # Location / GPS
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  # Local storage (offline support)
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  path: ^1.9.0
  # UI & Charts
  fl_chart: ^0.67.0
  google_fonts: ^6.2.1
  intl: ^0.19.0
  # Utilities
  uuid: ^4.3.3
  crypto: ^3.0.3
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
